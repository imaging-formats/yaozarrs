name: Documentation
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      # TODO: re-enable --strict once https://github.com/zensical/zensical/issues/700
      # (and the related autorefs over-flagging) is fixed.
      - run: uv run --group docs zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/deploy-pages@v5
        id: deployment
